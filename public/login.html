<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sign in or register for Smart Retail Inventory Management System" />
    <title>Sign In | Smart Retail Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/forms.css" />
  </head>
  <body>
    <!-- Apply saved theme immediately to prevent flash -->
    <script>
      (function() {
        var t = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <div class="auth-page">
      <!-- Theme Toggle -->
      <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle theme" style="position:fixed;top:20px;right:20px;z-index:100;">
        <svg class="icon-moon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>

      <!-- 3D Flip Card Container -->
      <div class="flip-container" id="flip-container">
        <div class="flip-card">

          <!-- ========== FRONT — Sign In ========== -->
          <div class="flip-face flip-front">
            <div class="auth-card">
              <div class="auth-header">
                <div class="auth-logo">
                  <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="14" fill="url(#g1)" />
                    <path d="M14 24L22 32L34 16" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                    <defs>
                      <linearGradient id="g1" x1="0" y1="0" x2="48" y2="48">
                        <stop stop-color="#6366f1" />
                        <stop offset="1" stop-color="#8b5cf6" />
                      </linearGradient>
                    </defs>
                  </svg>
                  <span class="auth-logo-text">SmartRetail</span>
                </div>
                <h2>Welcome back</h2>
                <p>Sign in to your dashboard</p>
              </div>

              <div class="auth-alert" id="login-alert"></div>

              <form class="auth-form" id="login-form" autocomplete="on">
                <div class="form-group">
                  <label for="login-email">Email Address</label>
                  <input type="email" id="login-email" placeholder="admin@smartretail.com" required autocomplete="email" />
                </div>

                <div class="form-group">
                  <label for="login-password">Password</label>
                  <div class="password-field">
                    <input
                      type="password"
                      id="login-password"
                      placeholder="Enter your password"
                      required
                      autocomplete="current-password"
                    />
                    <button type="button" class="password-toggle" id="toggle-password-btn" aria-label="Toggle password visibility">
                      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                      </svg>
                    </button>
                  </div>
                </div>

                <button type="submit" class="auth-btn" id="login-btn">
                  <span class="btn-text">Sign In</span>
                </button>
              </form>

              <div class="auth-footer">Don't have an account? <a href="#" id="show-register-btn">Create one</a></div>
            </div>
          </div>

          <!-- ========== BACK — Register ========== -->
          <div class="flip-face flip-back">
            <div class="auth-card">
              <div class="auth-header">
                <div class="auth-logo">
                  <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="14" fill="url(#g2)" />
                    <path d="M14 24L22 32L34 16" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                    <defs>
                      <linearGradient id="g2" x1="0" y1="0" x2="48" y2="48">
                        <stop stop-color="#6366f1" />
                        <stop offset="1" stop-color="#8b5cf6" />
                      </linearGradient>
                    </defs>
                  </svg>
                  <span class="auth-logo-text">SmartRetail</span>
                </div>
                <h2>Create Account</h2>
                <p>Get started with inventory management</p>
              </div>

              <div class="auth-alert" id="register-alert"></div>

              <form class="auth-form" id="register-form" autocomplete="on">
                <div class="form-row">
                  <div class="form-group">
                    <label for="register-first-name">First Name</label>
                    <input type="text" id="register-first-name" placeholder="Rajesh" required />
                  </div>
                  <div class="form-group">
                    <label for="register-last-name">Last Name</label>
                    <input type="text" id="register-last-name" placeholder="Kumar" required />
                  </div>
                </div>

                <div class="form-group">
                  <label for="register-email">Email Address</label>
                  <input type="email" id="register-email" placeholder="you@company.com" required autocomplete="email" />
                </div>

                <div class="form-group">
                  <label for="register-phone">Phone (optional)</label>
                  <input type="tel" id="register-phone" placeholder="+91-9876543210" />
                </div>

                <div class="form-group">
                  <label for="register-password">Password</label>
                  <input type="password" id="register-password" placeholder="Min 8 chars, 1 upper, 1 lower, 1 digit" required />
                </div>

                <div class="form-group">
                  <label for="register-confirm-password">Confirm Password</label>
                  <input type="password" id="register-confirm-password" placeholder="Re-enter your password" required />
                </div>

                <button type="submit" class="auth-btn" id="register-btn">
                  <span class="btn-text">Create Account</span>
                </button>
              </form>

              <div class="auth-footer">Already have an account? <a href="#" id="show-login-btn">Sign in</a></div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
      // Theme Toggle
      (function() {
        var btn = document.getElementById('theme-toggle-btn');
        if (!btn) return;
        btn.addEventListener('click', function() {
          var current = document.documentElement.getAttribute('data-theme') || 'dark';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
        });
      })();

      // Flip Card Toggle with dynamic height
      (function() {
        var container = document.getElementById('flip-container');
        var flipCard  = container ? container.querySelector('.flip-card') : null;
        var front     = container ? container.querySelector('.flip-front') : null;
        var back      = container ? container.querySelector('.flip-back')  : null;
        var showRegister = document.getElementById('show-register-btn');
        var showLogin    = document.getElementById('show-login-btn');

        // Measure and apply the height of the active face
        function syncHeight(isFlipped) {
          if (!front || !back || !container) return;
          // Temporarily make both visible to measure
          back.style.visibility  = 'hidden';
          front.style.visibility = 'hidden';
          var h = isFlipped ? back.scrollHeight : front.scrollHeight;
          back.style.visibility  = '';
          front.style.visibility = '';
          container.style.height = h + 'px';
          if (flipCard) flipCard.style.height = h + 'px';
        }

        function flipTo(flipped) {
          if (!container) return;
          if (flipped) {
            container.classList.add('flipped');
          } else {
            container.classList.remove('flipped');
          }
          syncHeight(flipped);
        }

        if (showRegister) {
          showRegister.addEventListener('click', function(e) {
            e.preventDefault();
            flipTo(true);
          });
        }
        if (showLogin) {
          showLogin.addEventListener('click', function(e) {
            e.preventDefault();
            flipTo(false);
          });
        }

        // Init height + handle #register hash
        var startFlipped = window.location.hash === '#register';
        // Wait for fonts/layout to settle before measuring
        window.addEventListener('load', function() {
          flipTo(startFlipped);
        });
      })();
    </script>
  </body>
</html>
